# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    container_name: tac_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-auto_reports}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: tac_backend
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Seoul
    volumes:
      - reports_data:/app/reports
      - storage_data:/app/storage
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

  frontend:
    build: ./frontend
    container_name: tac_frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    volumes:
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"

volumes:
  db_data:
  reports_data:
  storage_data:

